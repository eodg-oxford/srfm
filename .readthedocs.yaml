# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt

apt:
  packages:
    - gfortran
    - build-essential
    - meson
    - ninja-build
    # Native deps for cartopy/netCDF4 wheels
    - libgeos-dev
    - libproj-dev
    - proj-data
    - proj-bin
    - libhdf5-dev
    - libnetcdf-dev
