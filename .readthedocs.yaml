# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"
  apt_packages:
    - gfortran
    - build-essential
    - meson
    - ninja-build
    - libgeos-dev
    - libproj-dev
    - proj-data
    - proj-bin
    - libhdf5-dev
    - libnetcdf-dev

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt
